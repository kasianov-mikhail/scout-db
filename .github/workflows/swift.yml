name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-26
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Lint
        run: xcrun swift-format lint --strict --recursive Sources Tests

  test:
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Test
        run: swift test
